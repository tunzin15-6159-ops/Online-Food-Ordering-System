// ================= LOAD MENU =================
let restaurant = localStorage.getItem("restaurant");
let menuDiv = document.getElementById("menu");

if(menuData[restaurant]){

    menuData[restaurant].forEach((item, index) => {

        let div = document.createElement("div");

        div.innerHTML = `
            <b>${item.name}</b> ($${item.price}) <br>
            Quantity: 
            <input type="number" min="0" value="0" id="qty${index}" 
            onchange="calculateTotal()">
            <hr>
        `;

        menuDiv.appendChild(div);
    });

} else {
    menuDiv.innerHTML = "<h3>No menu available</h3>";
}

// ================= TOTAL =================
function calculateTotal(){

    let total = 0;

    let items = menuData[restaurant];

    items.forEach((item, index) => {
        let qty = document.getElementById("qty" + index).value;
        total += qty * item.price;
    });

    document.getElementById("total").innerText = total;

   
}

function goToPayment(){
    window.location.href = "payment.html";
}
